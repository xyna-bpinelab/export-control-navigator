baseURL = "https://xyna-bpinelab.github.io/export-control-navigator/"
title = "Export Control Navigator"

enableRobotsTXT = true
enableGitInfo = true

defaultContentLanguage = "ja"
defaultContentLanguageInSubdir = false

[languages]
  [languages.ja]
    languageCode = "ja"
    languageName = "日本語"
    contentDir = "content/ja"
    weight = 1
    [languages.ja.params]
      description = "輸出管理規制ナビゲーター"
  [languages.en]
    languageCode = "en"
    languageName = "English"
    contentDir = "content/en"
    weight = 2
    [languages.en.params]
      description = "Export Control Navigator"

[module]
  proxy = "direct"
  [[module.imports]]
    path = "github.com/google/docsy"
    disable = false
  [[module.imports]]
    path = "github.com/google/docsy/dependencies"
    disable = false

[params]
  copyright = "Export Control Navigator"
  privacy_policy = ""

  [params.ui]
    sidebar_menu_compact = true
    breadcrumb_disable = false
    sidebar_search_disable = false
    navbar_logo = true
    footer_about_enable = false
    ul_show = 1

  [params.links]
    [[params.links.user]]
      name = "GitHub"
      url = "https://github.com/xyna-bpinelab/export-control-navigator"
      icon = "fab fa-github"
      desc = "Development takes place here!"

[markup]
  [markup.goldmark]
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "tango"
